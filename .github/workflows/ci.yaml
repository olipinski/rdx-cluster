---
name: CI
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install test dependencies.
        run: pip3 install yamllint hvac

      - name: Check spelling.
        uses: codespell-project/actions-codespell@406322ec52dd7b488e48c1c4b82e2a8b3a1bf630 # v2
        with:
          skip: docs,design
          builtin: clear,rare,informal

      - name: Ansible-lint the Ansible YAMLs.
        uses: ansible/ansible-lint@262624cd0ab22a4221293216856c59671ce7aa5e # v26.6.0

      - name: Lint all the Kubernetes YAMLs.
        run: yamllint kubernetes/

      - name: Kube-lint the Kubernetes YAMLs.
        uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1
        with:
          directory: ./kubernetes
          config: .kube-linter.yaml
