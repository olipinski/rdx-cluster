---
# Generate TLS certificates for external services
# Generated using certbot (letsencrypt) or selfsigned certificates
- name: Generate external services certificates
  hosts: localhost
  gather_facts: true
  tags:
    - certificates
  vars:
    certbot_propagation_seconds: 300
  pre_tasks:
    # Include vault variables
    - name: Include vault variables
      ansible.builtin.include_vars: vars/vault.yaml
    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml
    - name: Copy Cloudflare secret file
      ansible.builtin.template:
        src: "{{ item.template }}"
        dest: "{{ item.dest }}"
        mode: "0600"
      with_items:
        - template: cloudflare-credentials.ini.j2
          dest: ~/.secrets/cloudflare-credentials.ini

  tasks:
    - name: Create LetsEncrypt certificate for external services
      ansible.builtin.command: |
        certbot certonly \
        --dns-cloudflare \
        --dns-cloudflare-credentials ~/.secrets/cloudflare-credentials.ini \
        --dns-cloudflare-propagation-seconds {{ certbot_propagation_seconds }} \
        --server https://acme-v02.api.letsencrypt.org/directory \
        --agree-tos \
        --non-interactive \
        --rsa-key-size 4096 \
        -m {{ acme_issuer_email }} \
        -d {{ item }}
      register: certbot_create
      changed_when:
        - certbot_create.rc==0
        - '"Certificate not yet due for renewal; no action taken." not in certbot_create.stdout'
      with_items:
        - "{{ seaweedfs_hostname }}"
        - "{{ openbao_hostname }}"

## Install SeaweedFS S3 Storage Server
- name: Install SeaweedFS S3 Storage Server
  hosts: s3
  gather_facts: true
  tags:
    - s3
  become: true
  pre_tasks:
    # Include vault variables
    - name: Include vault variables
      ansible.builtin.include_vars: vars/vault.yaml
    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml

    - name: Ensure SeaweedFS data directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      with_items:
        - "{{ seaweedfs_master_dir }}"
        - "{{ seaweedfs_volume_dir }}"

    - name: Get LetsEncrypt TLS certificate for SeaweedFS
      block:
        - name: Check TLS certificate for SeaweedFS exits
          ansible.builtin.command: "certbot certificates -d {{ seaweedfs_hostname }}"
          register: certbot_certificates
          delegate_to: localhost
          become: false
          changed_when: false
          failed_when:
            - '"Certificate Name: " + seaweedfs_hostname not in certbot_certificates.stdout'
        - name: Get certificate and key paths for SeaweedFS
          ansible.builtin.set_fact:
            seaweedfs_cert_path: "{{ certbot_certificates.stdout | regex_search(regexp1, '\\1') }}"
            seaweedfs_cert_key_path: "{{ certbot_certificates.stdout | regex_search(regexp2, '\\1') }}"
          vars:
            regexp1: "Certificate Path: (\\S+)"
            regexp2: "Private Key Path: (\\S+)"
          when:
            - certbot_certificates.rc==0
            - '"Certificate Name: " + seaweedfs_hostname in certbot_certificates.stdout'

    - name: Move SeaweedFS TLS certificate to target node
      ansible.builtin.copy:
        dest: "{{ seaweedfs_config_dir }}/fullchain.pem"
        mode: '0700'
        src: "{{ seaweedfs_cert_path[0] }}"

    - name: Move SeaweedFS TLS key to target node
      ansible.builtin.copy:
        dest: "{{ seaweedfs_config_dir }}/privkey.pem"
        mode: '0700'
        src: "{{ seaweedfs_cert_key_path[0] }}"

  roles:
    - role: hostinger.common.seaweedfs

## Install OpenBao Server
- name: Install OpenBao Server
  hosts: bao
  gather_facts: true
  tags:
    - openbao
  become: true
  vars:
    server_hostname: "{{ openbao_hostname }}"
    selfsigned_certificates_path: ../certificates

  pre_tasks:
    # Include vault variables
    - name: Include vault variables
      ansible.builtin.include_vars: vars/vault.yaml
    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml

    - name: Get letsencrypt TLS certificate for vault
      block:
        - name: Check TLS certificate for vault exits
          ansible.builtin.command: "certbot certificates -d {{ openbao_hostname }}"
          register: certbot_certificates
          delegate_to: localhost
          become: false
          changed_when: false
          failed_when:
            - '"Certificate Name: " + openbao_hostname not in certbot_certificates.stdout'
        - name: Get certificate and key paths for minio
          ansible.builtin.set_fact:
            cert_path: "{{ certbot_certificates.stdout | regex_search(regexp1, '\\1') }}"
            cert_key_path: "{{ certbot_certificates.stdout | regex_search(regexp2, '\\1') }}"
          vars:
            regexp1: "Certificate Path: (\\S+)"
            regexp2: "Private Key Path: (\\S+)"
          when:
            - certbot_certificates.rc==0
            - '"Certificate Name: " + openbao_hostname in certbot_certificates.stdout'
        - name: Load tls key and cert
          ansible.builtin.set_fact:
            openbao_key: "{{ lookup('file', cert_key_path[0]) }}"
            openbao_cert: "{{ lookup('file', cert_path[0]) }}"
  roles:
    - role: olipinski.openbao

  tasks:
    # Configure ansible user profile with VAULT environment variables
    - name: Insert http(s) export in dotfile
      become: true
      ansible.builtin.lineinfile:
        path: ~{{ ansible_user }}/.bashrc
        regexp: ^export VAULT_ADDR=
        line: export VAULT_ADDR='https://{{ openbao_hostname }}:8200'
        owner: "{{ ansible_user }}"
        create: true
        mode: "0644"
    - name: Insert CA cert export in dotfile
      become: true
      ansible.builtin.lineinfile:
        path: ~{{ ansible_user }}/.bashrc
        regexp: ^export VAULT_CACERT=
        line: export VAULT_CACERT=/etc/vault/tls/vault-ca.crt
        owner: "{{ ansible_user }}"
        create: true
        mode: "0644"
      when: custom_ca
    - name: Insert VAULT_TOKEN in dotfile
      become: true
      ansible.builtin.lineinfile:
        path: ~{{ ansible_user }}/.bashrc
        regexp: ^export VAULT_TOKEN=
        line: export VAULT_TOKEN=$(sudo jq -r '.root_token' /etc/openbao/unseal.json)
        owner: "{{ ansible_user }}"
        create: true
        mode: "0644"

## Load all credentials into OpenBao server
- name: Load OpenBao Credentials
  hosts: bao
  gather_facts: true
  tags:
    - openbao
    - credentials
  become: false
  pre_tasks:
    # Include vault variables
    - name: Include vault variables
      ansible.builtin.include_vars: vars/vault.yaml
    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml
    - name: Ensure PIP is installed.
      ansible.builtin.package:
        name:
          - python3-pip
          - python3-virtualenv
          - python3-setuptools
        state: present
      become: true

    # Install HashiCorp vault collection dependencies (hvac python package) using PIP.
    - name: Ensure hvac Python library is installed.
      ansible.builtin.pip:
        name: hvac
        state: present
        virtualenv: "{{ openbao_venv_path }}"
      become: true

  tasks:
    # Login to OpenBao using ansible environment variables for creating the token file used in the next tasks.
    - name: OpenBao login # noqa: no-changed-when
      ansible.builtin.shell: bash -ilc 'echo $VAULT_TOKEN'
      become: false
      register: openbao_login

    - name: Get OpenBao token
      ansible.builtin.set_fact:
        openbao_token: "{{ openbao_login.stdout }}"

    # Create write token
    - name: Create KV write token
      community.hashi_vault.vault_token_create:
        url: https://{{ openbao_dns }}:8200
        policies:
          - write
        auth_method: token
        token: "{{ openbao_token }}"
      register: token_data
      become: false
      vars:
        ansible_python_interpreter: "{{ openbao_venv_path }}/bin/python"

    - name: Create/update credentials for all Ansible credentials
      community.hashi_vault.vault_kv2_write:
        url: "https://{{ openbao_dns }}:8200"
        auth_method: token
        token: "{{ token_data | community.hashi_vault.vault_login_token }}"
        read_before_write: true
        path: "{{ item.group }}/{{ item.key }}"
        data: "{{ item.data }}"
      no_log: true
      vars:
        ansible_python_interpreter: "{{ openbao_venv_path }}/bin/python"
      loop: >-
        {%- set results = [] -%}
        	{%- for secret_group in vault  -%}
        		{%- for secret in vault[secret_group] -%}
        			{%- set _ = results.append({
        			"group": secret_group,
        			"key": secret,
        			"data": vault[secret_group][secret]
        			}) %}
        		{%- endfor -%}
        	{%- endfor -%}
        {{ results }}
      loop_control:
        label: "Creating/updating credentials for {{ item.group }}"

    - name: Load http auth_basic credentials
      ansible.builtin.include_tasks:
        file: tasks/create_basic_auth_credentials.yaml
      no_log: true

    - name: Load bind9 DDNS key
      ansible.builtin.include_tasks:
        file: tasks/load_ddns_key_into_vault.yaml
      no_log: true
