---
- name: Configure Cilium CNI
  hosts: localhost
  tags:
    - install
    - cni
  gather_facts: false
  become: false
  pre_tasks:
    - name: Set overlay
      ansible.builtin.set_fact:
        overlay: "{{ overlay | default('prod') }}"
    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml
  tasks:
    - name: Wait for Cilium CRDs to be ready # noqa: no-changed-when
      become: false
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          while ! kubectl wait --for condition=established --timeout=60s \
          crd/ciliuml2announcementpolicies.cilium.io crd/ciliuml2announcementpolicies.cilium.io
          do
          sleep 10
          done
        executable: /bin/bash
    - name: Cilium configuration # noqa: no-changed-when
      become: false
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          kubectl kustomize --enable-helm --load-restrictor=LoadRestrictionsNone \
          ../kubernetes/platform/cilium/config/overlays/{{ overlay }} | kubectl apply -f -
        executable: /bin/bash
      register: output

- name: Bootstrap HashiCorp Vault
  hosts: localhost
  gather_facts: false
  pre_tasks:
    - name: Include vault variables
      ansible.builtin.include_vars: vars/vault.yaml
    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml
  tags:
    - bootstrap
    - vault
  tasks:
    - name: Deploy Vault
      kubernetes.core.helm:
        name: vault
        chart_ref: vault
        chart_repo_url: https://helm.releases.hashicorp.com
        chart_version: 0.32.0
        release_namespace: vault
        create_namespace: true
        values_files:
          - ../../kubernetes/platform/vault/app/base/values.yaml
        # Overwrite values for the vault Helm chart setting Vault dns name
        set_values:
          - value: "global.externalVaultAddr=https://{{ vault_hostname }}:8200"
            value_type: string

    - name: Get reviewer token # noqa: no-changed-when
      ansible.builtin.shell: |
        set -o pipefail
        KUBERNETES_SA_SECRET_NAME=$(kubectl get secrets --output=json -n vault \
        | jq -r '.items[].metadata \
        | select(.name|startswith("vault-auth")).name')
        TOKEN_REVIEW_JWT=$(kubectl get secret $KUBERNETES_SA_SECRET_NAME -n vault -o jsonpath='{.data.token}' \
        | base64 --decode)
        echo $TOKEN_REVIEW_JWT
      register: get_reviewer_token

    - name: Set reviewer token
      ansible.builtin.set_fact:
        vault_reviewer_token: "{{ get_reviewer_token.stdout }}"

    - name: Get Kubernetes CA cert # noqa: no-changed-when
      ansible.builtin.shell: |
        set -o pipefail
        KUBERNETES_CA_CERT=$(kubectl config view --raw --minify --flatten \
          --output='jsonpath={.clusters[].cluster.certificate-authority-data}' \
          | base64 --decode | awk 'NF {sub(/\r/, ""); printf "%s\\n",$0;}')
        echo $KUBERNETES_CA_CERT
      register: get_kubernetes_ca

    - name: Set CA cert
      ansible.builtin.set_fact:
        kubernetes_ca_cert: "{{ get_kubernetes_ca.stdout }}"

    - name: Set kubernetes_host
      ansible.builtin.set_fact:
        kubernetes_host: "https://{{ k3s_registration_address }}:6443"

    - name: Configure vault-kubernetes-auth
      ansible.builtin.include_tasks: tasks/vault_kubernetes_auth_method_config.yaml

- name: Bootstrap FluxCD
  hosts: localhost
  gather_facts: false
  pre_tasks:
    - name: Include vault variables
      ansible.builtin.include_vars: vars/vault.yaml
    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml
  tags:
    - bootstrap
    - gitops
  tasks:
    - name: Ensure FluxCD namespace exists
      kubernetes.core.k8s:
        name: flux-system
        api_version: v1
        kind: Namespace
        state: present
    - name: Add cluster settings
      kubernetes.core.k8s:
        definition: |
          {{ lookup('kubernetes.core.kustomize', dir='../kubernetes/clusters/' + overlay + '/config') }}
        state: present
    - name: Set the domain names in a ConfigMap
      kubernetes.core.k8s:
        state: present
        template: templates/domain-config.yaml.j2
    - name: Deploy Flux CD Operator
      kubernetes.core.helm:
        name: flux-operator
        chart_ref: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
        # renovate: datasource=docker depName=fluxcd ociRepository=oci://ghcr.io/controlplaneio-fluxcd/charts
        chart_version: 0.43.0
        release_namespace: flux-system
        create_namespace: true
        values_files:
          - ../kubernetes/platform/flux-operator/operator/base/values.yaml
          - ../kubernetes/platform/flux-operator/operator/components/monitoring/values.yaml
          - ../kubernetes/platform/flux-operator/operator/overlays/prod/values.yaml
    - name: Bootstrap Flux
      kubernetes.core.helm:
        name: flux-instance
        chart_ref: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
        # renovate: datasource=helm depName=fluxcd ociRepository=oci://ghcr.io/controlplaneio-fluxcd/charts
        chart_version: 0.43.0
        release_namespace: flux-system
        create_namespace: true
        values_files:
          - ../kubernetes/platform/flux-operator/instance/base/values.yaml
          - ../kubernetes/platform/flux-operator/instance/overlays/prod/values.yaml

# Now that FluxCD is taking over, clean up the installation manifests
- name: Clean ansible-created manifests
  hosts: k3s_server
  become: true
  gather_facts: false
  tasks:
    - name: Find ansible managed manifests
      ansible.builtin.find:
        path: /var/lib/rancher/k3s/server/manifests/
        patterns: "*-ansible.yaml"
      register: ansible_manifests

    - name: Delete ansible-managed manifests
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ ansible_manifests.files }}"
