---
- name: OpenBao login # noqa: no-changed-when
  ansible.builtin.shell: bash -ilc 'echo $VAULT_TOKEN'
  # Interactive bash so .bashrc is loaded
  # 'source ~/.bashrc && <command>' does not work because
  # Ansible shell is not interactive and ~/.bashrc implementation by default ignores non interactive shell.
  # See lines at beginning of bashrc:
  #
  # If not running interactively, don't do anything
  # case $- in
  #     *i*) ;;
  #       *) return;;
  # esac
  # The best solution for executing commands as user after its ssh interactive login:
  # bash -ilc '<command>'
  # '-i' means interactive shell, so .bashrc won't be ignored '-l' means login shell which sources full user profile
  become: false
  register: openbao_login
  delegate_to: service0

- name: Get OpenBao token
  ansible.builtin.set_fact:
    openbao_token: "{{ openbao_login.stdout }}"

- name: Get status of the Kubernetes auth method
  ansible.builtin.uri:
    url: "https://{{ openbao_dns }}:8200/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_token }}"
  failed_when:
    - false
  delegate_to: service0
  register: openbao_status_kubernetes_auth_method

- name: Enable Kubernetes auth method
  ansible.builtin.uri:
    url: "https://{{ openbao_dns }}:8200/v1/sys/auth/kubernetes"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_token }}"
    body:
      type: kubernetes
      description: kubernetes auth
    body_format: json
    status_code:
      - 200
      - 204
  when:
    - "'kubernetes/' not in openbao_status_kubernetes_auth_method.json.data"
  delegate_to: service0

- name: Configure Kubernetes auth method
  ansible.builtin.uri:
    url: "https://{{ openbao_dns }}:8200/v1/auth/kubernetes/config"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_token }}"
    body:
      kubernetes_host: "{{ kubernetes_host }}"
      kubernetes_ca_cert: "{{ kubernetes_ca_cert }}"
      token_reviewer_jwt: "{{ openbao_reviewer_token }}"
    body_format: json
    status_code:
      - 200
      - 204
  delegate_to: service0

- name: Create ExternalSecrets role
  ansible.builtin.uri:
    url: "https://{{ openbao_dns }}:8200/v1/auth/kubernetes/role/external-secrets"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_token }}"
    body:
      bound_service_account_names: external-secrets
      bound_service_account_namespaces: external-secrets
      policies:
        - read
    body_format: json
    status_code:
      - 200
      - 204
  delegate_to: service0

- name: Create Prometheus policy
  ansible.builtin.uri:
    url: "https://{{ openbao_dns }}:8200/v1/sys/policy/prometheus-monitoring"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_token }}"
    body:
      policy: |
        path "/sys/metrics" {
          capabilities = ["read", "list"]
        }
    body_format: json
    status_code:
      - 200
      - 204
  delegate_to: service0

- name: Create Prometheus role
  ansible.builtin.uri:
    url: "https://{{ openbao_dns }}:8200/v1/auth/kubernetes/role/prometheus"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_token }}"
    body:
      bound_service_account_names: kube-prometheus-stack-prometheus
      bound_service_account_namespaces: kube-prom-stack
      policies:
        - default
        - prometheus-monitoring
    body_format: json
    status_code:
      - 200
      - 204
  delegate_to: service0
