---
- name: Start K3s servers
  hosts: k3s_master
  become: true
  gather_facts: false
  tasks:
    - name: Start K3s Service
      ansible.builtin.service:
        name: k3s
        state: started
- name: Start K3s agents
  hosts: k3s_worker
  become: true
  gather_facts: false
  tasks:
    - name: Start K3s Service
      ansible.builtin.service:
        name: k3s-agent
        state: started
