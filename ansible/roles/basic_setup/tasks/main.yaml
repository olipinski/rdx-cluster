---
# Get list of packages installed
- name: Get list of packages
  ansible.builtin.package_facts:
    manager: auto

- name: Remove snap package
  ansible.builtin.include_tasks: remove_snap.yaml
  when: >
    'snapd' in ansible_facts.packages
    and 'maas' not in group_names

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ basic_setup_common_packages }}"
    update_cache: true
    state: present

- name: Execute Radxa Rock 5B+ specific setup tasks
  ansible.builtin.include_tasks: radxa_tasks.yaml
  when: "'radxa' in group_names"

- name: Execute RaspberryPi 5 specific setup tasks
  ansible.builtin.include_tasks: raspberrypi_tasks.yaml
  when: "'raspberrypi' in group_names"

- name: Load required kernel modules
  ansible.builtin.include_tasks: load_kernel_modules.yaml

- name: Blocklist storage devices in multipath configuration
  ansible.builtin.include_tasks: multipath_blocklist.yaml

- name: Increase max_user_watches for k3s
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: '2796202'
    state: present
  when: "'k3s' in group_names"

- name: Increase max_user_instances for k3s
  ansible.posix.sysctl:
    name: fs.inotify.max_user_instances
    value: '43690'
    state: present
  when: "'k3s' in group_names"

- name: Increase max_queued_events for k3s
  ansible.posix.sysctl:
    name: fs.inotify.max_queued_events
    value: '5592405'
    state: present
  when: "'k3s' in group_names"
