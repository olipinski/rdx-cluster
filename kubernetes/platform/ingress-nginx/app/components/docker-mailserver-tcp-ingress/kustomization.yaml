apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

configMapGenerator:
  - name: docker-mailserver-tcp-ingress-values
    behavior: merge
    files:
      - docker-mailserver-tcp-ingress-values.yaml=values.yaml

patches:
- target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
    name: ingress-nginx
  path: helm-patch.yaml