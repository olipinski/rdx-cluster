---
apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana

metadata:
  name: efk
spec:
  # renovate: datasource=github-releases depName=elastic/elasticsearch
  version: 9.3.3
  count: 1
  elasticsearchRef:
    name: efk
  podTemplate:
    spec:
      # Limiting Resources consumption
      containers:
        - name: kibana
          resources:
            requests:
              memory: 1Gi
            limits:
              memory: 1Gi
