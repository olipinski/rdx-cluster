---
apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-config-job
spec:
  ttlSecondsAfterFinished: 3600 # Delete the job once done, if needed 1h to inspect logs
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-kibana
          image: curlimages/curl:8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          imagePullPolicy: IfNotPresent
          env:
            - name: KIBANA_URL
              value: efk-kb-http
            - name: KIBANA_PORT
              value: "5601"
          command:
            - /bin/sh
            - /kibana/wait-for-kibana.sh
          volumeMounts:
            - name: kibana-config-data
              mountPath: /kibana/
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
          resources:
            requests:
              cpu: 1m
              memory: 128Mi
            limits:
              memory: 128Mi
      containers:
        - name: kibana-config-job
          image: curlimages/curl:8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          env:
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: efk-es-elastic-user
                  key: elastic
            - name: KIBANA_URL
              value: efk-kb-http
            - name: KIBANA_PORT
              value: "5601"
          command:
            - /bin/sh
            - /kibana/create-data-view.sh
          volumeMounts:
            - name: kibana-config-data
              mountPath: /kibana/
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
          resources:
            requests:
              cpu: 1m
              memory: 128Mi
            limits:
              memory: 128Mi
      volumes:
        - name: kibana-config-data
          configMap:
            name: kibana-config-data
            defaultMode: 0777 # yamllint disable-line rule:octal-values
