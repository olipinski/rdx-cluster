---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-externalsecret
spec:
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-secret
  data:
    - secretKey: password
      remoteRef:
        key: keycloak/admin
        property: password
    - secretKey: username
      remoteRef:
        key: keycloak/admin
        property: user
