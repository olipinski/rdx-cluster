---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

resources:
  - ../../base

configMapGenerator:
  - name: csi-driver-nfs-helm-values
    behavior: merge
    files:
      - overlay-values.yaml=values.yaml

patches:
  - target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: csi-driver-nfs
    path: helm-patch.yaml
