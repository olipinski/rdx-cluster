---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-externalsecret
  namespace: longhorn-system
spec:
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: longhorn-s3-secret
    template:
      engineVersion: v2
      data:
        AWS_ENDPOINTS: "https://${S3_SERVER}:8443"
        AWS_ACCESS_KEY_ID: "{{ .user | toString }}"
        AWS_SECRET_ACCESS_KEY: "{{ .key | toString }}"
  data:
    - secretKey: user
      remoteRef:
        key: seaweedfs/longhorn
        property: user
    - secretKey: key
      remoteRef:
        key: seaweedfs/longhorn
        property: key
