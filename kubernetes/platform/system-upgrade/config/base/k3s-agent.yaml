---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-agent
  namespace: system-upgrade
  labels:
    k3s-upgrade: agent
spec:
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  serviceAccountName: system-upgrade
  # Wait for k3s-server upgrade plan to complete before executing k3s-agent plan
  prepare:
    image: rancher/k3s-upgrade@sha256:a51530d62449b469b7c76ec191117ad1cc3325cab8f0bbcc0991aa6f9a631962
    args:
      - prepare
      - k3s-server
  concurrency: 1
  # Cordon node before upgrade it
  cordon: true
  upgrade:
    image: rancher/k3s-upgrade@sha256:a51530d62449b469b7c76ec191117ad1cc3325cab8f0bbcc0991aa6f9a631962
  # renovate: datasource=github-releases depName=k3s-io/k3s
  version: v1.35.4+k3s1
