---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-agent
  namespace: system-upgrade
  labels:
    k3s-upgrade: agent
spec:
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  serviceAccountName: system-upgrade
  # Wait for k3s-server upgrade plan to complete before executing k3s-agent plan
  prepare:
    image: rancher/k3s-upgrade@sha256:8448c66782e42c7dd562408f5494f2a83ba4086d261dfba2555317d087ce994b
    args:
      - prepare
      - k3s-server
  concurrency: 1
  # Cordon node before upgrade it
  cordon: true
  upgrade:
    image: rancher/k3s-upgrade@sha256:8448c66782e42c7dd562408f5494f2a83ba4086d261dfba2555317d087ce994b
  # renovate: datasource=github-releases depName=k3s-io/k3s
  version: v1.35.3+k3s1
