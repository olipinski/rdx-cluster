---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-server
  namespace: system-upgrade
  labels:
    k3s-upgrade: server
spec:
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
  # Enable plan deployment on server node (noSchedulable by installation)
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  serviceAccountName: system-upgrade
  concurrency: 1
  # Cordon node before upgrading it
  cordon: true
  upgrade:
    image: rancher/k3s-upgrade:v1.36.1-k3s1@sha256:204ceadf970c96dc8f04ae1c17240c1fbb8fbbba891f5a9f4246c8163473e4dc
  # renovate: datasource=github-releases depName=k3s-io/k3s
  version: v1.36.1+k3s1
