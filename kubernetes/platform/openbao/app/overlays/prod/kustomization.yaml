---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openbao

resources:
  - ../../base

configMapGenerator:
  - name: openbao-helm-values
    behavior: merge
    files:
      - overlay-values.yaml=values.yaml

patches:
  - target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: openbao
    path: helm-patch.yaml
