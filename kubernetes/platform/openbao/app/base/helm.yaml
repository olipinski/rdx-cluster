---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
spec:
  interval: 30m
  chart:
    spec:
      chart: openbao
      version: 0.28.4
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
  releaseName: openbao
  targetNamespace: openbao
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: openbao-helm-values
      valuesKey: base-values.yaml
