---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opentelemetry-elasticsearch-exporter-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: opentelemetry-elasticsearch-exporter-secret
  data:
    - secretKey: es-username
      remoteRef:
        key: elastic/opentelemetry
        property: user
    - secretKey: es-password
      remoteRef:
        key: elastic/opentelemetry
        property: password
