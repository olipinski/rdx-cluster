apiVersion: kustomize.config.k8s.io/v1beta1
kind: Component
namespace: nginx

configMapGenerator:
  - name: ingress-nginx-helm-values
    behavior: merge
    files:
      - tcp-ingress-nginx-values.yaml=values.yaml

patches:
- target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
    name: ingress-nginx
  path: helm-patch.yaml