---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud-aio-helm-chart
      version: 13.2.1
      sourceRef:
        kind: GitRepository
        name: nextcloud-git
        namespace: flux-system
  releaseName: nextcloud
  targetNamespace: nextcloud
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  valuesFrom:
    - kind: ConfigMap
      name: nextcloud-helm-values
      valuesKey: base-values.yaml
