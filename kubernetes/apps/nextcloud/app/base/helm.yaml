---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 30m
  timeout: 15m # Nextcloud takes a long time to come up
  chart:
    spec:
      chart: nextcloud-aio-helm-chart
      version: 13.2.2
      sourceRef:
        kind: GitRepository
        name: nextcloud-git
        namespace: flux-system
  postRenderers:
    - kustomize:
        patchesStrategicMerge:
          - kind: Deployment
            apiVersion: apps/v1
            metadata:
              name: nextcloud-aio-nextcloud
            spec:
              template:
                spec:
                  containers:
                    - name: nextcloud-aio-nextcloud
                      livenessProbe:
                        initialDelaySeconds: 300 # Add a larger delay, it takes a while to start up
                  terminationGracePeriod: 300 # Reduce from 10 to 5 minutes
  releaseName: nextcloud
  targetNamespace: nextcloud
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: nextcloud-helm-values
      valuesKey: base-values.yaml
