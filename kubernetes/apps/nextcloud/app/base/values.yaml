---
DATABASE_PASSWORD: ${NEXTCLOUD_DATABASE_PASSWORD}
FULLTEXTSEARCH_PASSWORD: ${NEXTCLOUD_FULLTEXTSEARCH_PASSWORD}
IMAGINARY_SECRET: ${NEXTCLOUD_IMAGINARY_SECRET}
NC_DOMAIN: cloud.${CLUSTER_DOMAIN}
NEXTCLOUD_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
RECORDING_SECRET: ${NEXTCLOUD_RECORDING_SECRET}
REDIS_PASSWORD: ${NEXTCLOUD_REDIS_PASSWORD}
SIGNALING_SECRET: ${NEXTCLOUD_SIGNALING_SECRET}
TALK_INTERNAL_SECRET: ${NEXTCLOUD_TALK_SECRET}
TIMEZONE: Europe/Warsaw
TURN_SECRET: ${NEXTCLOUD_TURN_SECRET}
WHITEBOARD_SECRET: ${NEXTCLOUD_WHITEBOARD_SECRET}

CLAMAV_ENABLED: "yes"
COLLABORA_ENABLED: "yes"
FULLTEXTSEARCH_ENABLED: "yes"
IMAGINARY_ENABLED: "yes"
TALK_ENABLED: "yes"
TALK_RECORDING_ENABLED: "yes"
WHITEBOARD_ENABLED: "yes"

APACHE_PORT: 443
INSTALL_LATEST_MAJOR: "yes"
TALK_PORT: 3478
UPDATE_NEXTCLOUD_APPS: "yes"

STORAGE_CLASS: longhorn
STORAGE_CLASS_DATA: nfs-csi-retain
APACHE_STORAGE_SIZE: 5Gi
CLAMAV_STORAGE_SIZE: 5Gi
DATABASE_STORAGE_SIZE: 5Gi
DATABASE_DUMP_STORAGE_SIZE: 20Gi
ELASTICSEARCH_STORAGE_SIZE: 5Gi
NEXTCLOUD_STORAGE_SIZE: 5Gi
NEXTCLOUD_DATA_STORAGE_SIZE: 200Gi
NEXTCLOUD_TRUSTED_CACERTS_STORAGE_SIZE: 1Gi
REDIS_STORAGE_SIZE: 5Gi
TALK_RECORDING_STORAGE_SIZE: 10Gi

NAMESPACE: nextcloud
NAMESPACE_DISABLED: "yes"
NETWORK_POLICY_ENABLED: "no"
NEXTCLOUD_DEFAULT_QUOTA: "unlimited"
NEXTCLOUD_MAINTENANCE_WINDOW: 1
SMTP_HOST: mail.${CLUSTER_DOMAIN}
SMTP_SECURE: ssl
SMTP_NAME: ${NEXTCLOUD_SMTP_USER}
SMTP_PASSWORD: ${NEXTCLOUD_SMTP_PASSWORD}
